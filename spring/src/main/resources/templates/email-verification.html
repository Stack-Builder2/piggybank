<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>이메일 인증</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f4f4;">
<table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; padding:30px; border-radius:10px;">
                <tr>
                    <td>
                        <h2 style="margin-top:0; margin-bottom:20px;">안녕하세요, <span th:text="${name}">회원</span>님!</h2>

                        <p style="margin-bottom:20px;">
                            회원님의 이메일을 인증하려면 아래 버튼을 클릭해주세요.
                        </p>

                        <!-- 버튼 -->
                        <p style="margin:25px 0;">
                            <a th:href="${verificationUrl}"
                               style="
                                        display: inline-block;
                                        padding: 12px 25px;
                                        background-color: #4CAF50;
                                        color: #ffffff;
                                        text-decoration: none;
                                        border-radius: 5px;
                                        font-weight: bold;
                                    ">
                                이메일 인증하기
                            </a>
                        </p>

                        <p style="margin-bottom:15px;">
                            버튼이 작동하지 않으면 아래 링크를 복사하여 브라우저에 붙여넣어 주세요:
                        </p>

                        <p style="word-break: break-all; margin-bottom:30px;" th:text="${verificationUrl}"></p>

                        <p style="margin-top:30px; font-size:12px; color:#777;">
                            본 메일은 발신 전용입니다. 문의 사항은 고객센터를 이용해주세요.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
